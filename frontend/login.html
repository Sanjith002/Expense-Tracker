<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-title">LOGIN</div>
                <form class="auth-form" onsubmit="handlelogin(event)">
                    <input id="login-email-input" type="email" placeholder="Email">
                    <div class="password-container">
                        <input id="login-input" type="password" placeholder="password">
                        <i id="show-login" class="bi bi-eye" onclick="togglePassword ('login-input','show-login','hide-login')"></i>
                        <i id="hide-login" class="bi bi-eye-slash" onclick="togglePassword ('login-input','show-login','hide-login')"></i>
                    </div>
                    <button type="submit">Login</button>
                </form>
                <div class="error loginError"></div>
                <div class="auth-footer">Don't have an account?<span class="auth-link"><a href="signup.html">Sign up</a></span></div>
            </div>
        </div>
    </div>
</body>
<script src="js/auth.js"></script>
</html>

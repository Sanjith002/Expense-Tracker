<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-title">SIGN UP</div>
                <form class="auth-form" onsubmit="handleSignup(event)">
                    <input id="user-input" type="text" placeholder="Username">
                    <input id="email-input" type="email" placeholder="Email">
                    <div class="password-container">
                        <input id="signup-input" type="password" placeholder="password">
                        <i id="show-signup" class="bi bi-eye" onclick="togglePassword ('signup-input','show-signup','hide-signup')"></i>
                        <i id="hide-signup" class="bi bi-eye-slash" onclick="togglePassword ('signup-input','show-signup','hide-signup')"></i>
                    </div>
                    <button type="submit">Sign up</button>
                </form>
                <div class="error signupError"></div>
                <div class="auth-footer">Already have an account ?<span class="auth-link"><a href="login.html">Login</a></span></div>
            </div>
        </div>
    </div>
</body>
<script src="js/auth.js"></script>
</html>
